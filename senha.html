<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.4/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-DQvkBjpPgn7RC31MCQoOeC9TI2kdqa4+BSgNMNj8v77fdC77Kj5zpWFTJaaAoMbC" crossorigin="anonymous">
  <link rel="stylesheet" href="css/estilos2.css">
  <title>Defina sua senha</title>
</head>
<body>

  <nav class="navbar navbar-expand-lg navbar-dark navbar-custom">
    <div class="container-fluid">
      <a class="navbar-brand d-flex align-items-center" style="gap: 0; padding: 0;">
        <img src="imagens/logo1.png" alt="Logo" width="100" height="80" style="margin: 0; padding: 0; display: block;">
        <span class="fw-bold" style="margin: 0; padding: 0;">SmartCash</span>
      </a>
      <div class="collapse navbar-collapse" id="navbarNavDropdown">
        <ul class="navbar-nav">
          <li class="nav-item">
            <a class="nav-link active" aria-current="page" href="#">Como funciona</a>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <div class="container d-flex justify-content-center align-items-center py-3">
    <div class="card shadow" style="width: 100%; max-width: 450px;">
      <div class="card-body">

        <div class="stepper d-flex justify-content-center mb-4">
          <div class="step active">
            <div class="circle">1</div>
            <div class="label">
              <strong>Informações de usuário</strong><br>
              <small>Preencha seus dados</small>
            </div>
          </div>
          <div class="step active">
            <div class="circle">2</div>
            <div class="label">
              <strong>Preencher senha</strong><br>
              <small>Preencha e confirme senha</small>
            </div>
          </div>
        </div>

        <h3 class="card-title text-center mb-4">Defina sua senha</h3>

        <form class="row g-3">
          <div class="col-12">
            <label for="senha" class="form-label">Senha</label>
            <input type="password" class="form-control" id="senha" required>
          </div>
          <div class="col-12">
            <label for="confirmarSenha" class="form-label">Confirmar Senha</label>
            <input type="password" class="form-control" id="confirmarSenha" required>
          </div>
          <div class="col-12 text-center">
            <input type="submit" value="Próximo" class="btn btn-primary px-5" />
          </div>
        </form>

      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.4/dist/js/bootstrap.bundle.min.js" integrity="sha384-YUe2LzesAfftltw+PEaao2tjU/QATaW/rOitAq67e0CT0Zi2VVRL0oC4+gAaeBKu" crossorigin="anonymous"></script>
</body>
</html>
