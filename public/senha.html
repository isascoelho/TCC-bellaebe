<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Defina sua senha</title>

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.4/dist/css/bootstrap.min.css"
    rel="stylesheet">

  <link rel="stylesheet" href="css/estilos2.css">
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark navbar-custom">
  <div class="container-fluid">
    <a class="navbar-brand d-flex align-items-center">
      <img src="imagens/logo1.png" width="100" height="80">
      <span class="fw-bold">SmartCash</span>
    </a>

    <div class="collapse navbar-collapse">
      <ul class="navbar-nav">
        <li class="nav-item">
          <a class="nav-link active" href="index.html">Página principal</a>
        </li>
      </ul>
    </div>
  </div>
</nav>

<div class="container d-flex justify-content-center align-items-center py-4">
  <div class="card shadow" style="max-width: 450px; width:100%">
    <div class="card-body">

      <div class="stepper d-flex justify-content-center mb-4">
        <div class="step active">
          <div class="circle">1</div>
          <div class="label">
            <strong>Informações de usuário</strong><br>
            <small>Preencha seus dados</small>
          </div>
        </div>
        <div class="step active">
          <div class="circle">2</div>
          <div class="label">
            <strong>Preencher senha</strong><br>
            <small>Preencha e confirme sua senha</small>
          </div>
        </div>
      </div>

      <h3 class="text-center mb-4">Defina sua senha</h3>

      <!-- FORM COM ID -->
      <form id="senhaForm" class="row g-3">

        <div class="col-12">
          <label class="form-label">Senha<span class="obrigatorio">*</span></label>
          <input type="password" id="senha" class="form-control" required>
        </div>

        <div class="col-12">
          <label class="form-label">Confirmar senha<span class="obrigatorio">*</span></label>
          <input type="password" id="confirmarSenha" class="form-control" required>
        </div>

        <p id="msg" class="text-center text-danger"></p>

        <div class="col-12 text-center">
          <button type="submit" class="btn btn-primary px-5">
            Finalizar cadastro
          </button>
        </div>

      </form>
    </div>
  </div>
</div>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.4/dist/js/bootstrap.bundle.min.js"></script>

<script>
document.getElementById("senhaForm").addEventListener("submit", function(e) {
  e.preventDefault();

  const senha = document.getElementById("senha").value;
  const confirmarSenha = document.getElementById("confirmarSenha").value;
  const msg = document.getElementById("msg");

  if (senha !== confirmarSenha) {
    msg.innerText = "As senhas não conferem";
    return;
  }

  const dadosUsuario = JSON.parse(localStorage.getItem("dadosCadastro"));

  if (!dadosUsuario) {
    msg.innerText = "Dados do cadastro não encontrados.";
    return;
  }

fetch("/cadastro", {
  method: "POST",
  headers: { "Content-Type": "application/json" },
  body: JSON.stringify({
    ...dadosUsuario,
    email: dadosUsuario.email.trim(),
    senha: senha.trim()
  })
})
.then(res => {
  if (!res.ok) throw new Error("Erro HTTP " + res.status);
  return res.json();
})
.then(resp => {
  localStorage.removeItem("dadosCadastro");
  alert("Cadastro realizado com sucesso!");
  window.location.href = "index.html";
})
.catch(err => {
  msg.innerText = "Erro ao finalizar cadastro";
  console.error(err);
});
});
</script>


</body>
</html>
