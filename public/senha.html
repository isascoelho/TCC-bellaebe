<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Defina sua senha</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.4/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="icon" type="image/png" href="imagens/logo1.png">
  <link rel="stylesheet" href="css/estilos2.css">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark navbar-custom">
  <div class="container-fluid">
    <a class="navbar-brand d-flex align-items-center">
      <img src="imagens/logo1.png" width="100" height="80">
      <span class="fw-bold">UpFinances</span>
    </a>
    <div class="collapse navbar-collapse">
      <ul class="navbar-nav">
        <li class="nav-item">
          <a class="nav-link active" href="index.html">Página principal</a>
        </li>
      </ul>
    </div>
  </div>
</nav>

<div class="container my-5 d-flex justify-content-center form-box">
  <div class="card" style="max-width:560px;width:100%;border-radius:16px;border:0.5px solid #e0e0e0;box-shadow:0 4px 24px rgba(0,0,0,0.07);padding:2rem 2.5rem;">

    <!-- STEPPER -->
    <div class="stepper">
      <div class="step done">
        <div class="circle">✓</div>
        <div class="label">
          <strong>Informações de usuário</strong>
          <small>Concluído</small>
        </div>
      </div>
      <div class="step active">
        <div class="circle">2</div>
        <div class="label">
          <strong>Preencher senha</strong>
          <small>Confirme sua senha</small>
        </div>
      </div>
    </div>

    <h3 class="card-title text-center mb-4">Defina sua senha</h3>

    <form id="senhaForm" class="row g-3">

      <div class="col-12">
        <label class="form-label-upper">Senha <span class="obrigatorio">*</span></label>
        <input type="password" id="senha" class="form-control" required>
      </div>

      <div class="col-12">
        <label class="form-label-upper">Confirmar senha <span class="obrigatorio">*</span></label>
        <input type="password" id="confirmarSenha" class="form-control" required>
      </div>

      <p id="msg" class="text-center text-danger mb-0"></p>

      <div class="col-12 d-flex justify-content-between align-items-center mt-2">
        <span class="obrigatorio" style="font-size:11px;">* Campos obrigatórios</span>
        <button type="submit" class="btn-proximo">Finalizar cadastro</button>
      </div>

    </form>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.4/dist/js/bootstrap.bundle.min.js"></script>
<script>
document.getElementById("senhaForm").addEventListener("submit", function(e) {
  e.preventDefault();

  const senha = document.getElementById("senha").value;
  const confirmarSenha = document.getElementById("confirmarSenha").value;
  const msg = document.getElementById("msg");

  if (senha !== confirmarSenha) {
    msg.innerText = "As senhas não conferem";
    return;
  }

  const dadosUsuario = JSON.parse(localStorage.getItem("dadosCadastro"));
  if (!dadosUsuario) {
    msg.innerText = "Dados do cadastro não encontrados.";
    return;
  }

  fetch("/cadastro", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ ...dadosUsuario, email: dadosUsuario.email.trim(), senha: senha.trim() })
  })
  .then(res => { if (!res.ok) throw new Error("Erro HTTP " + res.status); return res.json(); })
  .then(() => {
    localStorage.removeItem("dadosCadastro");
    alert("Cadastro realizado com sucesso!");
    window.location.href = "index.html";
  })
  .catch(err => {
    msg.innerText = "Erro ao finalizar cadastro";
    console.error(err);
  });
});
</script>
<p style="text-align: center; font-size: 12px; color: #888; padding: 1.5rem 0;">
  &copy; 2026 UpFinances
</p>




</body>
</html>
