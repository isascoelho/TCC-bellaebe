<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.4/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-DQvkBjpPgn7RC31MCQoOeC9TI2kdqa4+BSgNMNj8v77fdC77Kj5zpWFTJaaAoMbC" crossorigin="anonymous">
    <title>Comece agora</title>
     <link rel="icon" type="image/png" href="imagens/logo1.png">
    <link rel="stylesheet" href="css/estilos1.css">
</head>

<body>
<nav class="navbar navbar-expand-lg navbar-dark navbar-custom">
  <div class="container-fluid">
    <a class="navbar-brand d-flex align-items-center" style="gap: 0; padding: 0;">
      <img src="imagens/logo1.png" alt="Logo" width="100" height="80" style="margin: 0; padding: 0; display: block;">
      <span class="fw-bold" style="margin: 0; padding: 0;">SmartCash</span>
    </a>
    <div class="collapse navbar-collapse" id="navbarNavDropdown">
      <ul class="navbar-nav">
        <li class="nav-item">
          <a class="nav-link active" aria-current="page" href="index.html">Página principal</a>
        </li>
      </ul>
    </div>
  </div>
</nav>

<div class="container login-container">
  <div class="frase-box">
    <img src="imagens/login.png" width="200">
    <h2 class="display-6 fw-bold estilo2-h2">Bem-vindo ao SmartCash!</h2>
    <h5>Seu controle financeiro começa aqui!</h5>
  </div>

  <div class="card">
    <div class="login-wrapper">
      <h2>Faça o seu login</h2>
      <div class="underline"></div>
      <form id="loginForm" action="#" method="POST">

        <!-- ✅ CAMPO CPF (substituiu e-mail) -->
        <label for="cpf">Seu CPF*</label>
        <input type="text" id="cpf" name="cpf" placeholder="000.000.000-00" maxlength="14" required>

        <label for="senha">Sua senha*</label>
        <input type="password" id="senha" name="senha" required>

        <button type="submit">ENTRAR</button>
      </form>
      <div class="forgot">
        Esqueceu sua senha? <a href="#">Clique aqui!</a>
      </div>
    </div>
  </div>
</div>

<!-- FOOTER -->
<footer class="site-footer">
  <div class="container footer-inner">
    <div class="footer-brand">
      <img src="imagens/logo1.png" alt="Logo SmartCash" width="90" height="70">
      <span class="fw-bold">SmartCash</span>
    </div>
    <p class="footer-pill">Simples • Seguro • Educativo</p>
    <div class="footer-copy">
      <p>&copy; 2026 SmartCash. Todos os direitos reservados.</p>
      <p>Este site foi desenvolvido para fins educativos e pessoais.</p>
    </div>
  </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.4/dist/js/bootstrap.bundle.min.js" integrity="sha384-YUe2LzesAfftltw+PEaao2tjU/QATaW/rOitAq67e0CT0Zi2VVRL0oC4+gAaeBKu" crossorigin="anonymous"></script>

<script>
  // ✅ MÁSCARA DE CPF: formata enquanto o usuário digita
  document.getElementById("cpf").addEventListener("input", function () {
    let valor = this.value.replace(/\D/g, ""); // remove tudo que não é número
    valor = valor.slice(0, 11);               // limita a 11 dígitos
    valor = valor.replace(/(\d{3})(\d)/, "$1.$2");
    valor = valor.replace(/(\d{3})(\d)/, "$1.$2");
    valor = valor.replace(/(\d{3})(\d{1,2})$/, "$1-$2");
    this.value = valor;
  });

  // ✅ VALIDAÇÃO DE CPF
  function validarCPF(cpf) {
    cpf = cpf.replace(/\D/g, "");
    if (cpf.length !== 11 || /^(\d)\1+$/.test(cpf)) return false;

    let soma = 0;
    for (let i = 0; i < 9; i++) soma += parseInt(cpf[i]) * (10 - i);
    let resto = (soma * 10) % 11;
    if (resto === 10 || resto === 11) resto = 0;
    if (resto !== parseInt(cpf[9])) return false;

    soma = 0;
    for (let i = 0; i < 10; i++) soma += parseInt(cpf[i]) * (11 - i);
    resto = (soma * 10) % 11;
    if (resto === 10 || resto === 11) resto = 0;
    return resto === parseInt(cpf[10]);
  }

  document.getElementById("loginForm").addEventListener("submit", function (e) {
    e.preventDefault();

    const cpf = document.getElementById("cpf").value.trim();
    const senha = document.getElementById("senha").value.trim();

    // ✅ Valida CPF antes de enviar
    if (!validarCPF(cpf)) {
      alert("CPF inválido. Verifique e tente novamente.");
      return;
    }

    // ✅ Envia apenas os números (sem pontos e traço)
    const cpfNumeros = cpf.replace(/\D/g, "");

    fetch("/login", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ cpf: cpfNumeros, senha })
    })
    .then(res => {
      if (!res.ok) throw new Error("CPF ou senha inválidos");
      return res.json();
    })
    .then(user => {
      localStorage.setItem("userId", user.ID);
      window.location.href = "home.html";
    })
    .catch(err => {
      alert(err.message);
    });
  });
</script>

</body>
</html>
