<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.4/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-DQvkBjpPgn7RC31MCQoOeC9TI2kdqa4+BSgNMNj8v77fdC77Kj5zpWFTJaaAoMbC" crossorigin="anonymous">
    <title>Comece agora</title>
     <link rel="stylesheet" href="css/estilos1.css">

</head>

<body>
<nav class="navbar navbar-expand-lg navbar-dark navbar-custom">
  <div class="container-fluid">
    <a class="navbar-brand d-flex align-items-center" style="gap: 0; padding: 0;">
  <img src="imagens/logo1.png" alt="Logo" width="100" height="80" style="margin: 0; padding: 0; display: block;">
  <span class="fw-bold" style="margin: 0; padding: 0;">SmartCash</span>
</a>
    <div class="collapse navbar-collapse" id="navbarNavDropdown">
      <ul class="navbar-nav">
        <li class="nav-item">
          <a class="nav-link active" aria-current="page" href="index.html">Página principal</a>
        </li>
      </ul>
    </div>
  </div>
</nav>

<div class="container login-container">
  <div class="frase-box">
    <img src="imagens/login.png" width="200">
    <h2 class="display-6 fw-bold estilo2-h2">Bem-vindo ao SmartCash!</h2>
    <h5>Seu controle financeiro começa aqui!</h5>
  </div>

  <div class="card">
    <div class="login-wrapper">
      <h2>Faça o seu login</h2>
      <div class="underline"></div>
      <form id="loginForm"action="#" method="POST">
        <label for="email" placeholder="Smartcash@gmail.com">Seu e-mail*</label>
        <input type="email" id="email" name="email" required>
   
        <label for="senha">Sua senha*</label>
        <input type="password" id="senha" name="senha" required>

        <button type="submit">ENTRAR</button>
      </form>
      <div class="forgot">
        Esqueceu sua senha? <a href="#">Clique aqui!</a>
      </div>
    </div>
  </div>
</div>

  <!-- FOOTER -->
  <footer class="site-footer">
    <div class="container footer-inner">
      <div class="footer-brand">
        <img src="imagens/logo1.png" alt="Logo SmartCash" width="90" height="70">
        <span class="fw-bold">SmartCash</span>
      </div>

      <p class="footer-pill">Simples • Seguro • Educativo</p>    

      <div class="footer-copy">
        <p>&copy; 2026 SmartCash. Todos os direitos reservados.</p>
        <p>Este site foi desenvolvido para fins educativos e pessoais.</p>
      </div>
    </div>
  </footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.4/dist/js/bootstrap.bundle.min.js" integrity="sha384-YUe2LzesAfftltw+PEaao2tjU/QATaW/rOitAq67e0CT0Zi2VVRL0oC4+gAaeBKu" crossorigin="anonymous"></script>  

<script>
document.getElementById("loginForm").addEventListener("submit", function (e) {
  e.preventDefault();

  const email = document.getElementById("email").value;
  const senha = document.getElementById("senha").value;

  fetch("/login", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ email, senha })
  })
  .then(res => res.json())
  .then(user => {
    if (user.error) {
      alert(user.error);
      return;
    }

    // 🔐 guarda quem está logado
    localStorage.setItem("userId", user.id);

    // 👉 vai para HOME
    window.location.href = "home.html";
  });
});
</script>

</body>
</html>
