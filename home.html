<script>
const userId = localStorage.getItem("userId");

// proteção
if (!userId) {
  window.location.href = "comece.html";
}

// busca dados do usuário
fetch(`/me/${userId}`)
  .then(res => res.json())
  .then(user => {
    if (!user) return;

    // nome e email
    document.getElementById("userNome").innerText = user.nome;
    document.getElementById("userEmail").innerText = user.email;

    // FOTO — sempre redefinir
    const img = document.getElementById("userFoto");
    const fotoPadrao = "imagens/avatar.png";

    img.src = ""; // limpa qualquer imagem anterior

    if (user.foto && user.foto.trim() !== "") {
      img.src = user.foto;
    } else {
      img.src = fotoPadrao;
    }
  });
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.4/dist/js/bootstrap.bundle.min.js" integrity="sha384-YUe2LzesAfftltw+PEaao2tjU/QATaW/rOitAq67e0CT0Zi2VVRL0oC4+gAaeBKu" crossorigin="anonymous"></script>
